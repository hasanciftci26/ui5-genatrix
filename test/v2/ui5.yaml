specVersion: '4.0'
metadata:
  name: ui5.genatrix.test.v2
type: application
framework:
  name: SAPUI5
  version: 1.136.16
  libraries:
    - name: sap.ui.core
    - name: sap.m
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
    - name: ui5-middleware-livereload
      afterMiddleware: compression
    - name: cors-proxy
      afterMiddleware: compression
---
specVersion: "4.0"
kind: extension
type: server-middleware
metadata:
  name: cors-proxy
middleware:
  path: middleware/proxy.js        